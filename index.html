<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #ffffff;
        }
        .card {
            text-align: center;
            padding: 2.5rem 3rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            backdrop-filter: blur(8px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        h1 {
            margin: 0 0 0.5rem;
            font-size: 2.5rem;
        }
        p {
            margin: 0;
            opacity: 0.85;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Hello, World!!!</h1>
        <p>Welcome to Deck-Gen-AI</p>
    </div>
</body>
</html>
