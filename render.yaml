services:
  - type: web
    name: deckgen-ai
    runtime: python
    plan: free
    branch: main
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn main:app --app-dir backend --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.4
      # Optional: enable AI-written narrative (works without it too)
      - key: OPENAI_API_KEY
        sync: false
